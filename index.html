<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BATTLE POWER</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bangers&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #3a0800;
  font-family: 'Press Start 2P', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
}

/* ── STAGE BACKGROUND CANVAS ── */
#bg-canvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}
#cabinet {
  position: relative;
  z-index: 1;
}
#start-btn { position: relative; z-index: 1; }

/* ═══════════════════════════════
   CABINET SHELL
═══════════════════════════════ */
#cabinet {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 660px;
  filter: drop-shadow(0 0 40px rgba(180,60,0,0.5));
}

/* ── MARQUEE ── */
#marquee {
  width: 100%;
  background: linear-gradient(180deg, #c40000 0%, #880000 40%, #540000 100%);
  border: 3px solid #ff5500;
  border-bottom: none;
  padding: 8px 50px 6px;
  text-align: center;
  position: relative;
}
#marquee::before, #marquee::after {
  content: '❖';
  position: absolute;
  top: 50%; transform: translateY(-50%);
  font-size: 18px;
  color: #ffd700;
  text-shadow: 0 0 8px #ff8c00;
}
#marquee::before { left: 14px; }
#marquee::after  { right: 14px; }
#marquee-title {
  font-family: 'Bangers', cursive;
  font-size: 56px;
  color: #ffd700;
  letter-spacing: 8px;
  line-height: 1.1;
  text-shadow:
    3px 3px 0 #aa3300,
    6px 6px 0 #6b0000,
    0   0  24px #ff8c00,
    0   0  50px #ff4400;
}
#marquee-sub {
  font-size: 6px;
  color: #ffaa44;
  letter-spacing: 3px;
  text-shadow: 0 0 6px #ff8c00;
  margin-top: 2px;
}

/* ═══════════════════════════════
   SF2-STYLE HUD
═══════════════════════════════ */
#hud {
  width: 100%;
  background: linear-gradient(180deg, #14100a, #0c0806);
  border-left: 3px solid #ff5500;
  border-right: 3px solid #ff5500;
  border-bottom: 2px solid #5a3800;
  padding: 6px 10px 7px;
}

/* Name row */
#name-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: baseline;
  margin-bottom: 4px;
}
.f-name {
  font-size: 8px;
  color: #f0c040;
  letter-spacing: 1px;
  text-shadow: 1px 1px 0 #8b4000;
}
.f-name.right { text-align: right; }
#score-center {
  font-size: 7px;
  color: #ccc;
  text-align: center;
  letter-spacing: 1px;
}

/* HP bars row */
#bar-row {
  display: grid;
  grid-template-columns: 1fr 56px 1fr;
  gap: 6px;
  align-items: center;
}

.hp-track {
  height: 20px;
  background: #1a0c04;
  border: 2px solid #7a5010;
  position: relative;
  overflow: hidden;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
}

/* P1 fills left→right */
#hp-p1 {
  position: absolute;
  left: 0; top: 0;
  height: 100%;
  width: 0%;
  transition: width 0.09s;
  background: linear-gradient(180deg, #fff07a 0%, #ffd700 30%, #d4a000 70%, #a07000 100%);
}
#hp-p1::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 7px;
  background: rgba(255,255,255,0.28);
}
#hp-p1.warn   { background: linear-gradient(180deg,#ffaa44,#dd7700,#aa5500); }
#hp-p1.danger { background: linear-gradient(180deg,#ff5544,#cc1100,#990000); }
#hp-p1.ultra  { background: linear-gradient(180deg,#ff88ff,#dd00dd,#990099); }

/* RECORD fills right→left */
#hp-hs {
  position: absolute;
  right: 0; top: 0;
  height: 100%;
  width: 100%;
  transition: width 0.09s;
  background: linear-gradient(180deg, #fff07a 0%, #ffd700 30%, #d4a000 70%, #a07000 100%);
}
#hp-hs::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 7px;
  background: rgba(255,255,255,0.2);
}

/* Center timer box */
#timer-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}
#ko-badge {
  font-size: 6px;
  background: #cc0000;
  color: #fff;
  padding: 1px 5px;
  border: 1px solid #ff4444;
  letter-spacing: 1px;
  text-align: center;
  line-height: 1.4;
}
#timer-num {
  font-size: 26px;
  color: #fff;
  text-shadow: 2px 2px 0 #333, 0 0 8px rgba(255,240,150,0.6);
  line-height: 1;
  text-align: center;
}
#timer-num.urgent {
  color: #ff4444;
  animation: shake 0.12s infinite;
}
@keyframes shake { 50% { transform: translateX(2px); } }

/* ═══════════════════════════════
   ARENA / STAGE
═══════════════════════════════ */
#arena {
  width: 100%;
  height: 456px;
  position: relative;
  border-left: 3px solid #ff5500;
  border-right: 3px solid #ff5500;
  overflow: hidden;
  background: #0d1a2a;
}

#webcam {
  width: 100%; height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
  display: block;
  opacity: 0.92;
}

#overlay-canvas {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 2;
}

/* CRT scanlines */
#arena::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px, transparent 3px,
    rgba(0,0,0,0.14) 3px, rgba(0,0,0,0.14) 4px
  );
  pointer-events: none;
  z-index: 5;
}

/* Vignette */
#vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center,
    transparent 45%, rgba(0,0,0,0.5) 100%);
  pointer-events: none;
  z-index: 3;
}

/* ── ANNOUNCEMENTS ── */
#announce {
  position: absolute;
  top: 42%; left: 50%;
  transform: translate(-50%, -50%) scale(0);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  z-index: 8;
  pointer-events: none;
  transition: transform 0.13s cubic-bezier(0.34, 1.56, 0.64, 1);
  white-space: nowrap;
}
#announce.show { transform: translate(-50%, -50%) scale(1); }

#announce-round {
  font-family: 'Bangers', cursive;
  font-size: 46px;
  color: #fff;
  letter-spacing: 5px;
  text-shadow:
    3px 3px 0 #0044cc,
    6px 6px 0 #002288,
   -1px -1px 0 #0066ff,
    0   0  18px #4488ff;
  -webkit-text-stroke: 1px #0033aa;
}
#announce-sub {
  font-family: 'Bangers', cursive;
  font-size: 32px;
  color: #ffd700;
  letter-spacing: 4px;
  text-shadow:
    2px 2px 0 #8b4000,
    4px 4px 0 #4a2000,
    0   0  14px #ff8c00;
  -webkit-text-stroke: 1px #cc5500;
}

/* NEW RECORD */
#rec-flash {
  position: absolute;
  top: 12px; left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: #ffd700;
  text-shadow: 2px 2px 0 #8b0000, 0 0 16px #ff8c00;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  z-index: 8;
  transition: opacity 0.25s;
  letter-spacing: 2px;
}
#rec-flash.show { opacity: 1; }

/* Loading */
#loading-screen {
  position: absolute;
  inset: 0;
  background: #0d1a2a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  z-index: 10;
}
.load-track {
  width: 280px; height: 14px;
  border: 2px solid #ffd700;
  overflow: hidden;
  box-shadow: 0 0 10px #ff8c00;
}
.load-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #ffd700, #ff8c00);
  animation: lbfill 3s ease-in-out forwards;
}
@keyframes lbfill { to { width: 96%; } }
.blink { animation: blink 1s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }

/* ═══════════════════════════════
   SCORE PANEL
═══════════════════════════════ */
#score-panel {
  width: 100%;
  background: linear-gradient(180deg, #12100a, #0a0806);
  border: 3px solid #ff5500;
  border-top: 2px solid #5a3800;
  padding: 7px 14px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 8px;
}
.s-block { display: flex; flex-direction: column; gap: 2px; }
.s-block.right { align-items: flex-end; }
.s-label { font-size: 6px; color: #888; letter-spacing: 1px; }
#power-num {
  font-size: 16px;
  color: #ffd700;
  text-shadow: 2px 2px 0 #8b4000, 0 0 12px #ff8c00;
  transition: color 0.2s, text-shadow 0.2s;
}
#level-label {
  font-family: 'Bangers', cursive;
  font-size: 20px;
  color: #ffd700;
  text-align: center;
  letter-spacing: 2px;
  text-shadow: 2px 2px 0 #8b0000, 0 0 10px currentColor;
  transition: color 0.25s;
}
#hs-num {
  font-size: 13px;
  color: #ff9944;
  text-shadow: 1px 1px 0 #8b0000, 0 0 10px #ff6600;
}

/* ── START BUTTON ── */
#start-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  background: linear-gradient(180deg, #cc0000, #8b0000, #660000);
  color: #ffd700;
  border-top: 2px solid #ff8844;
  border-left: 2px solid #ff8844;
  border-right: 2px solid #4a0000;
  border-bottom: 2px solid #4a0000;
  padding: 11px 28px;
  cursor: pointer;
  letter-spacing: 2px;
  text-shadow: 2px 2px 0 #4a0000;
  box-shadow: 0 0 20px rgba(255,100,0,0.4), inset 0 1px 0 rgba(255,200,100,0.15);
  margin-top: 8px;
  display: block;
  transition: all 0.1s;
}
#start-btn:hover:not(:disabled) {
  background: linear-gradient(180deg, #ff2200, #cc0000, #8b0000);
  box-shadow: 0 0 30px rgba(255,100,0,0.7);
  transform: translateY(-1px);
}
#start-btn:active:not(:disabled) { transform: translateY(1px); }
#start-btn:disabled { opacity: 0.45; cursor: default; }

/* ═══════════════════════════════
   LOBBY SCREEN
═══════════════════════════════ */
#lobby-screen {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.35s;
}
#lobby-screen.hide { opacity: 0; pointer-events: none; }

#lobby-box {
  background: linear-gradient(180deg, #1c0a00, #0a0400);
  border: 3px solid #ff5500;
  box-shadow: 0 0 50px rgba(255,80,0,0.45), inset 0 0 40px rgba(0,0,0,0.5);
  padding: 28px 44px 24px;
  display: flex; flex-direction: column; align-items: center; gap: 18px;
  min-width: 480px;
}
#lobby-title {
  font-family: 'Bangers', cursive;
  font-size: 62px; color: #ffd700; letter-spacing: 6px; line-height: 1;
  text-shadow: 3px 3px 0 #aa3300, 6px 6px 0 #6b0000, 0 0 24px #ff8c00, 0 0 50px #ff4400;
}
#lobby-sub {
  font-size: 9px; color: #ffaa44; letter-spacing: 4px;
  text-shadow: 0 0 8px #ff8c00;
}
#player-btns { display: flex; gap: 18px; margin: 4px 0; }

.p-btn {
  font-family: 'Bangers', cursive; font-size: 34px; letter-spacing: 1px;
  width: 92px; height: 92px; border-radius: 50%; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.1s, box-shadow 0.1s;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.45);
  position: relative; overflow: hidden;
}
.p-btn::before {
  content: ''; position: absolute;
  top: 8%; left: 15%; width: 40%; height: 35%;
  background: rgba(255,255,255,0.30); border-radius: 50%; pointer-events: none;
}
.p-btn:hover  { transform: scale(1.09); }
.p-btn:active { transform: scale(0.94); }

.p-btn.c1 { background: radial-gradient(circle at 38% 35%, #ffe85a, #cc8800); color: #3a1a00; box-shadow: 0 7px 0 #885500, 0 0 22px rgba(255,190,0,0.45); }
.p-btn.c2 { background: radial-gradient(circle at 38% 35%, #ff7070, #cc0000); color: #fff;    box-shadow: 0 7px 0 #880000, 0 0 22px rgba(255,0,0,0.45); }
.p-btn.c3 { background: radial-gradient(circle at 38% 35%, #7aadff, #0044cc); color: #fff;    box-shadow: 0 7px 0 #002288, 0 0 22px rgba(0,80,255,0.45); }
.p-btn.c4 { background: radial-gradient(circle at 38% 35%, #76ee88, #008822); color: #fff;    box-shadow: 0 7px 0 #005511, 0 0 22px rgba(0,180,40,0.45); }

#lobby-coin {
  font-size: 7px; color: #ff8800; letter-spacing: 3px;
  animation: blink 1s step-end infinite;
}

/* ═══════════════════════════════
   READY SCREEN
═══════════════════════════════ */
#ready-screen {
  position: fixed; inset: 0; z-index: 80;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.78);
  opacity: 0; pointer-events: none; transition: opacity 0.22s;
}
#ready-screen.show { opacity: 1; pointer-events: auto; }
#ready-content { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px; }
#ready-player {
  font-family: 'Bangers', cursive; font-size: 56px; color: #ffd700; letter-spacing: 6px;
  text-shadow: 3px 3px 0 #8b0000, 0 0 22px #ff8c00;
}
#ready-sub { font-size: 9px; color: #ffaa44; letter-spacing: 4px; min-height: 18px; }
#ready-countdown {
  font-family: 'Bangers', cursive; font-size: 110px; color: #fff; line-height: 1;
  text-shadow: 4px 4px 0 #8b0000, 0 0 35px #ff4400;
  transition: transform 0.08s cubic-bezier(0.34,1.56,0.64,1);
}
#ready-countdown.pop { transform: scale(1.25); }

/* ═══════════════════════════════
   RESULTS SCREEN
═══════════════════════════════ */
#results-screen {
  position: fixed; inset: 0; z-index: 80;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.88);
  opacity: 0; pointer-events: none; transition: opacity 0.4s;
}
#results-screen.show { opacity: 1; pointer-events: auto; }
#results-box {
  background: linear-gradient(180deg, #1c0a00, #0a0400);
  border: 3px solid #ff5500;
  box-shadow: 0 0 50px rgba(255,80,0,0.5);
  padding: 28px 52px 26px;
  min-width: 460px; max-width: 560px;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
}
#results-title {
  font-family: 'Bangers', cursive; font-size: 52px; color: #ff4400; letter-spacing: 5px;
  text-shadow: 3px 3px 0 #8b0000, 0 0 22px #ff4400;
}
#results-winner {
  font-family: 'Bangers', cursive; font-size: 22px; letter-spacing: 3px;
  color: #ffd700; text-shadow: 2px 2px 0 #8b4000, 0 0 14px #ff8c00;
  min-height: 28px;
}
#results-list { width: 100%; display: flex; flex-direction: column; gap: 0; }
.r-row {
  display: grid; grid-template-columns: 28px 80px 1fr auto;
  gap: 10px; align-items: center;
  padding: 9px 4px; border-bottom: 1px solid rgba(255,80,0,0.18);
  animation: fadeInUp 0.4s ease-out both;
  font-size: 10px;
}
.r-row:last-child { border-bottom: none; }
@keyframes fadeInUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
.r-medal  { font-size: 18px; text-align: center; }
.r-rank   { font-size: 7px; letter-spacing: 1px; }
.r-name   { font-size: 10px; }
.r-score  { font-size: 13px; text-align: right; }
.r-row.first .r-name, .r-row.first .r-score { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
.r-row.second .r-name, .r-row.second .r-score { color: #c0c0c0; text-shadow: 0 0 8px #c0c0c0; }
.r-row.third  .r-name, .r-row.third  .r-score  { color: #cd7f32; text-shadow: 0 0 8px #cd7f32; }

#results-again {
  font-family: 'Press Start 2P', monospace; font-size: 10px;
  background: linear-gradient(180deg, #cc0000, #8b0000);
  color: #ffd700;
  border-top: 2px solid #ff8844; border-left: 2px solid #ff8844;
  border-right: 2px solid #4a0000; border-bottom: 2px solid #4a0000;
  padding: 10px 26px; cursor: pointer; letter-spacing: 2px;
  margin-top: 6px; transition: all 0.1s;
}
#results-again:hover {
  background: linear-gradient(180deg, #ff2200, #cc0000);
  transform: translateY(-1px);
}
</style>
</head>
<body>

<!-- ── LOBBY ── -->
<div id="lobby-screen">
  <div id="lobby-box">
    <div id="lobby-title">BATTLE POWER</div>
    <div id="lobby-sub">SELECT NUMBER OF PLAYERS</div>
    <div id="player-btns">
      <button class="p-btn c1" onclick="selectPlayers(1)">1P</button>
      <button class="p-btn c2" onclick="selectPlayers(2)">2P</button>
      <button class="p-btn c3" onclick="selectPlayers(3)">3P</button>
      <button class="p-btn c4" onclick="selectPlayers(4)">4P</button>
    </div>
    <div id="lobby-coin">▶ PRESS BUTTON TO START ◀</div>
  </div>
</div>

<!-- ── READY ── -->
<div id="ready-screen">
  <div id="ready-content">
    <div id="ready-player">PLAYER 1</div>
    <div id="ready-sub">GET READY!</div>
    <div id="ready-countdown">3</div>
  </div>
</div>

<!-- ── RESULTS ── -->
<div id="results-screen">
  <div id="results-box">
    <div id="results-title">GAME OVER</div>
    <div id="results-winner"></div>
    <div id="results-list"></div>
    <button id="results-again" onclick="backToLobby()">▶ PLAY AGAIN ◀</button>
  </div>
</div>

<canvas id="bg-canvas"></canvas>

<div id="cabinet">

  <!-- MARQUEE -->
  <div id="marquee">
    <div id="marquee-title">BATTLE POWER</div>
    <div id="marquee-sub">BATTLE POWER DETECTOR · SCOUTER v2.0</div>
  </div>

  <!-- SF2 HUD -->
  <div id="hud">
    <div id="name-row">
      <div class="f-name" id="p1-name">PLAYER 1</div>
      <div id="score-center">RND <span id="round-num">1</span></div>
      <div class="f-name right">RECORD</div>
    </div>
    <div id="bar-row">
      <div class="hp-track"><div id="hp-p1"></div></div>
      <div id="timer-box">
        <div id="ko-badge">PWR</div>
        <div id="timer-num">99</div>
      </div>
      <div class="hp-track"><div id="hp-hs"></div></div>
    </div>
  </div>

  <!-- ARENA -->
  <div id="arena">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay-canvas" width="660" height="456"></canvas>
    <div id="vignette"></div>

    <!-- ROUND / FIGHT announcement -->
    <div id="announce">
      <div id="announce-round">ROUND 1</div>
      <div id="announce-sub">BATTLE ON!</div>
    </div>

    <div id="rec-flash">✦ NEW RECORD! ✦</div>

    <div id="loading-screen">
      <p style="font-size:9px;color:#ffd700;text-shadow:2px 2px 0 #8b0000;letter-spacing:3px">AI SCOUTER v2.0</p>
      <div class="load-track"><div class="load-fill"></div></div>
      <p class="blink" style="font-size:7px;color:#ff8800;letter-spacing:2px">INITIALIZING...</p>
    </div>
  </div>

  <!-- SCORE PANEL -->
  <div id="score-panel">
    <div class="s-block">
      <div class="s-label">BATTLE POWER</div>
      <div id="power-num">------</div>
    </div>
    <div id="level-label">STAND BY</div>
    <div class="s-block right">
      <div class="s-label">HIGH SCORE</div>
      <div id="hs-num">0</div>
    </div>
  </div>

</div>


<script>
/* ═══════════════════════════════════════════════
   JAPANESE ROOFTOP NIGHT STAGE BACKGROUND
═══════════════════════════════════════════════ */
(function () {
  const bg = document.getElementById('bg-canvas');
  const c  = bg.getContext('2d');

  /* Pre-generate stable star positions */
  const STARS = (() => {
    const arr = [];
    let sx = 12345, sy = 67890;
    const rng = () => { sx ^= sx << 13; sx ^= sx >> 17; sx ^= sx << 5; return (sx >>> 0) / 4294967296; };
    for (let i = 0; i < 220; i++) arr.push([rng(), rng() * 0.54, rng() * 1.1 + 0.35]);
    return arr;
  })();

  function draw() {
    const W = bg.width  = window.innerWidth;
    const H = bg.height = window.innerHeight;
    c.clearRect(0, 0, W, H);

    /* ── 1. SKY  (deep indigo → warm orange at horizon) ── */
    const sky = c.createLinearGradient(0, 0, 0, H * 0.82);
    sky.addColorStop(0,    '#08051a');
    sky.addColorStop(0.18, '#100c2c');
    sky.addColorStop(0.42, '#180e38');
    sky.addColorStop(0.64, '#2a1200');
    sky.addColorStop(0.80, '#8c3a00');
    sky.addColorStop(1,    '#c85800');
    c.fillStyle = sky;
    c.fillRect(0, 0, W, H * 0.82);

    /* ── 2. GROUND ── */
    const gnd = c.createLinearGradient(0, H * 0.80, 0, H);
    gnd.addColorStop(0,   '#3a1400');
    gnd.addColorStop(0.3, '#1a0800');
    gnd.addColorStop(1,   '#040200');
    c.fillStyle = gnd;
    c.fillRect(0, H * 0.80, W, H * 0.20);

    /* ── 3. STARS ── */
    for (const [xr, yr, sz] of STARS) {
      c.globalAlpha = 0.25 + sz * 0.65;
      c.fillStyle = '#ddeeff';
      c.beginPath();
      c.arc(xr * W, yr * H, sz * 0.75, 0, Math.PI * 2);
      c.fill();
    }
    c.globalAlpha = 1;

    /* ── 4. CRESCENT MOON ── */
    const mR = Math.min(W, H) * 0.058;
    const mX = W * 0.630, mY = H * 0.170;
    /* halo */
    const mHalo = c.createRadialGradient(mX, mY, mR * 0.8, mX, mY, mR * 3.2);
    mHalo.addColorStop(0,   'rgba(200,215,240,0.18)');
    mHalo.addColorStop(1,   'rgba(0,0,0,0)');
    c.fillStyle = mHalo;
    c.beginPath(); c.arc(mX, mY, mR * 3.2, 0, Math.PI * 2); c.fill();
    /* disc + crescent cut */
    c.save();
    c.beginPath(); c.arc(mX, mY, mR, 0, Math.PI * 2); c.clip();
    c.fillStyle = '#c4cce0';
    c.fillRect(mX - mR, mY - mR, mR * 2, mR * 2);
    /* subtle crater texture */
    c.fillStyle = 'rgba(155,162,188,0.45)';
    c.beginPath(); c.arc(mX + mR*0.12, mY - mR*0.22, mR*0.22, 0, Math.PI*2); c.fill();
    c.fillStyle = 'rgba(140,148,175,0.28)';
    c.beginPath(); c.arc(mX - mR*0.28, mY + mR*0.28, mR*0.13, 0, Math.PI*2); c.fill();
    /* shadow bite */
    c.fillStyle = '#09051c';
    c.beginPath(); c.arc(mX - mR*0.28, mY - mR*0.05, mR*0.86, 0, Math.PI*2); c.fill();
    c.restore();

    /* ── 5. ORANGE CLOUDS (large, fluffy) ── */
    paintCloud(c, W*0.14, H*0.36, W*0.26, H*0.13, 1.00);
    paintCloud(c, W*0.30, H*0.24, W*0.18, H*0.09, 0.85);
    paintCloud(c, W*0.04, H*0.50, W*0.16, H*0.07, 0.62);
    paintCloud(c, W*0.50, H*0.44, W*0.15, H*0.07, 0.48);
    paintCloud(c, W*0.65, H*0.30, W*0.11, H*0.06, 0.38);
    paintCloud(c, W*0.38, H*0.55, W*0.20, H*0.05, 0.28);
    paintCloud(c, W*0.72, H*0.50, W*0.10, H*0.05, 0.22);

    /* ── 6. CASTLE / PAGODA (center silhouette) ── */
    drawPagoda(c, W*0.50, H*0.17, H*0.60);

    /* ── 7. BIRDS ── */
    drawBirds(c, W, H);

    /* ── 8. LEFT CURVED ROOF ── */
    drawLeftRoof(c, W, H);

    /* ── 9. RIGHT STEPPED ROOF ── */
    drawRightRoof(c, W, H);

    /* ── 10. WOODEN STAGE FLOOR ── */
    drawStageFloor(c, W, H);

    /* ── 11. SIGN POST (風林火山) ── */
    drawSignPost(c, W, H);

    /* ── 12. GROUND MIST ── */
    const mist = c.createRadialGradient(W*0.50, H*0.80, 0, W*0.50, H*0.80, W*0.48);
    mist.addColorStop(0,   'rgba(210,130,55,0.20)');
    mist.addColorStop(0.5, 'rgba(150,80,25,0.09)');
    mist.addColorStop(1,   'rgba(0,0,0,0)');
    c.fillStyle = mist;
    c.fillRect(0, H*0.70, W, H*0.16);

    /* ── 13. VIGNETTE ── */
    const vig = c.createRadialGradient(W/2, H/2, H*0.08, W/2, H/2, W*0.82);
    vig.addColorStop(0,   'rgba(0,0,0,0)');
    vig.addColorStop(0.65,'rgba(0,0,0,0.20)');
    vig.addColorStop(1,   'rgba(0,0,0,0.82)');
    c.fillStyle = vig;
    c.fillRect(0, 0, W, H);
  }

  /* ──────────────────────────────
     CLOUD (fluffy, amber/orange)
  ────────────────────────────── */
  function paintCloud(c, cx, cy, rw, rh, alpha) {
    const bumps = [
      [ 0.00,  0.00, 1.00, 1.00],
      [-0.30,  0.10, 0.70, 0.70],
      [ 0.32,  0.08, 0.72, 0.70],
      [-0.58,  0.22, 0.54, 0.56],
      [ 0.58,  0.20, 0.57, 0.57],
      [ 0.00, -0.20, 0.58, 0.66],
      [-0.20, -0.14, 0.50, 0.58],
      [ 0.22, -0.16, 0.52, 0.60],
    ];
    c.save();
    for (const [ox, oy, sw, sh] of bumps) {
      const bx = cx + ox*rw, by = cy + oy*rh;
      const g = c.createRadialGradient(bx, by, 0, bx, by, rw*sw);
      g.addColorStop(0,    `rgba(218,98,18,${alpha*0.92})`);
      g.addColorStop(0.45, `rgba(178,65,8,${alpha*0.78})`);
      g.addColorStop(0.82, `rgba(95,30,3,${alpha*0.38})`);
      g.addColorStop(1,    `rgba(40,10,0,0)`);
      c.fillStyle = g;
      c.beginPath();
      c.ellipse(bx, by, rw*sw, rh*sh, 0, 0, Math.PI*2);
      c.fill();
    }
    /* bright top highlight */
    const hg = c.createRadialGradient(cx-rw*0.08, cy-rh*0.18, 0, cx-rw*0.08, cy-rh*0.18, rw*0.44);
    hg.addColorStop(0, `rgba(255,195,75,${alpha*0.60})`);
    hg.addColorStop(1, 'rgba(255,140,30,0)');
    c.fillStyle = hg;
    c.globalAlpha = 1;
    c.beginPath();
    c.ellipse(cx-rw*0.08, cy-rh*0.18, rw*0.44, rh*0.40, 0, 0, Math.PI*2);
    c.fill();
    c.restore();
  }

  /* ──────────────────────────────
     PAGODA / CASTLE SILHOUETTE
  ────────────────────────────── */
  function drawPagoda(c, cx, topY, totalH) {
    const COL  = '#14090000'.slice(0,7) || '#140900';
    const DARK = '#0a050000'.slice(0,7) || '#0a0500';
    c.save();
    /* spire */
    c.fillStyle = '#140900';
    c.beginPath(); c.moveTo(cx, topY); c.lineTo(cx-2, topY+20); c.lineTo(cx+2, topY+20); c.closePath(); c.fill();
    c.fillRect(cx-1.5, topY+20, 3, 14);

    const tiers = [
      {rw:22, rh:12, bw:14, bh:16},
      {rw:40, rh:17, bw:24, bh:20},
      {rw:62, rh:21, bw:36, bh:24},
      {rw:86, rh:25, bw:50, bh:28},
      {rw:106,rh:27, bw:62, bh:30},
    ];
    let y = topY + 34;
    for (const {rw, rh, bw, bh} of tiers) {
      c.fillStyle = '#140900';
      c.beginPath(); c.moveTo(cx, y); c.lineTo(cx-rw-8, y+rh+4); c.lineTo(cx+rw+8, y+rh+4); c.closePath(); c.fill();
      c.fillStyle = '#0a0500';
      c.fillRect(cx-bw, y+rh, bw*2, 3);
      c.fillStyle = '#140900';
      c.fillRect(cx-bw, y+rh+3, bw*2, bh);
      c.fillStyle = 'rgba(255,120,30,0.10)';
      c.fillRect(cx-5, y+rh+7, 10, bh*0.48);
      y += rh+bh+3;
    }
    c.fillStyle = '#140900';
    c.fillRect(cx-88, y, 176, 8);
    c.restore();
  }

  /* ──────────────────────────────
     BIRDS
  ────────────────────────────── */
  function drawBirds(c, W, H) {
    const bd = [
      [0.47,0.34,9],[0.51,0.32,8],[0.54,0.355,7],
      [0.43,0.37,8],[0.57,0.345,7],[0.60,0.36,6],
    ];
    c.save();
    c.strokeStyle = 'rgba(200,212,240,0.72)';
    c.lineWidth = 1.5; c.lineCap = 'round';
    for (const [xr,yr,ws] of bd) {
      const bx=W*xr, by=H*yr;
      c.beginPath();
      c.moveTo(bx-ws, by+1);
      c.quadraticCurveTo(bx-ws/2, by-3.5, bx, by+0.5);
      c.quadraticCurveTo(bx+ws/2, by-3.5, bx+ws, by+1);
      c.stroke();
    }
    c.restore();
  }

  /* ──────────────────────────────
     LEFT CURVED JAPANESE ROOF
     (large, with tomoe ornaments)
  ────────────────────────────── */
  function drawLeftRoof(c, W, H) {
    c.save();

    /* main body */
    c.fillStyle = '#1a1828';
    c.beginPath();
    c.moveTo(-W*0.02, H);
    c.lineTo(-W*0.02, H*0.50);
    c.bezierCurveTo(W*0.06, H*0.14, W*0.22, H*0.26, W*0.45, H*0.42);
    c.lineTo(W*0.47, H);
    c.closePath();
    c.fill();

    /* top (slightly lighter blue face) */
    c.fillStyle = '#22203a';
    c.beginPath();
    c.moveTo(-W*0.02, H*0.50);
    c.bezierCurveTo(W*0.06, H*0.14, W*0.22, H*0.26, W*0.45, H*0.42);
    c.lineTo(W*0.45, H*0.48);
    c.bezierCurveTo(W*0.22, H*0.34, W*0.06, H*0.22, -W*0.02, H*0.58);
    c.closePath();
    c.fill();

    /* eave strip */
    c.fillStyle = '#28263e';
    c.beginPath();
    c.moveTo(-W*0.02, H*0.58);
    c.bezierCurveTo(W*0.06, H*0.22, W*0.22, H*0.34, W*0.45, H*0.48);
    c.lineTo(W*0.45, H*0.535);
    c.bezierCurveTo(W*0.22, H*0.395, W*0.06, H*0.275, -W*0.02, H*0.635);
    c.closePath();
    c.fill();

    /* eave ridge highlight */
    c.strokeStyle = 'rgba(80,76,122,0.55)';
    c.lineWidth = 2.5;
    c.beginPath();
    c.moveTo(-W*0.02, H*0.50);
    c.bezierCurveTo(W*0.06, H*0.14, W*0.22, H*0.26, W*0.45, H*0.42);
    c.stroke();

    /* ── Tomoe (巴) ornaments ── */
    const tomoe = [
      [W*0.04, H*0.665, H*0.052],
      [W*0.14, H*0.555, H*0.054],
      [W*0.26, H*0.455, H*0.050],
      [W*0.37, H*0.415, H*0.044],
    ];
    for (const [tx, ty, tr] of tomoe) {
      /* drop shadow */
      c.fillStyle = 'rgba(0,0,0,0.38)';
      c.beginPath(); c.arc(tx+2, ty+3, tr, 0, Math.PI*2); c.fill();
      /* outer dark ring */
      c.fillStyle = '#100e1c';
      c.beginPath(); c.arc(tx, ty, tr, 0, Math.PI*2); c.fill();
      /* spokes */
      c.strokeStyle = '#08070e';
      c.lineWidth = Math.max(1.5, tr*0.09);
      for (let a=0; a<Math.PI*2; a+=Math.PI/4) {
        c.beginPath();
        c.moveTo(tx+Math.cos(a)*tr*0.40, ty+Math.sin(a)*tr*0.40);
        c.lineTo(tx+Math.cos(a)*tr*0.92, ty+Math.sin(a)*tr*0.92);
        c.stroke();
      }
      /* inner face */
      c.fillStyle = '#1a1828';
      c.beginPath(); c.arc(tx, ty, tr*0.66, 0, Math.PI*2); c.fill();
      /* center dot */
      c.fillStyle = '#0e0c18';
      c.beginPath(); c.arc(tx, ty, tr*0.26, 0, Math.PI*2); c.fill();
      /* rim highlight */
      c.strokeStyle = 'rgba(82,78,118,0.48)';
      c.lineWidth = 1.5;
      c.beginPath(); c.arc(tx, ty, tr, 0, Math.PI*2); c.stroke();
    }

    c.restore();
  }

  /* ──────────────────────────────
     RIGHT STEPPED TILE ROOF
  ────────────────────────────── */
  function drawRightRoof(c, W, H) {
    c.save();

    /* body */
    c.fillStyle = '#1c1a2a';
    c.beginPath();
    c.moveTo(W*1.02, H);
    c.lineTo(W*1.02, H*0.36);
    c.lineTo(W*0.58, H*0.18);
    c.lineTo(W*0.57, H*0.24);
    c.lineTo(W*0.58, H);
    c.closePath();
    c.fill();

    /* top face */
    c.fillStyle = '#24223a';
    c.beginPath();
    c.moveTo(W*1.02, H*0.36);
    c.lineTo(W*0.58, H*0.18);
    c.lineTo(W*0.57, H*0.24);
    c.lineTo(W*1.02, H*0.42);
    c.closePath();
    c.fill();

    /* tile lines — diagonal (follow the slope) */
    const steps = 18;
    const x0=W*0.575, y0=H*0.205, x1=W*1.02, y1=H*0.39;
    c.strokeStyle = '#0e0c1a';
    c.lineWidth = 1.8;
    for (let i=0; i<=steps; i++) {
      const t = i/steps;
      const lx = x0+(x1-x0)*t, ly = y0+(y1-y0)*t;
      c.beginPath();
      c.moveTo(lx, ly);
      c.lineTo(lx + (W*0.44)*0.08, ly + H*0.62);
      c.stroke();
    }
    /* horizontal tile courses */
    for (let i=0; i<=10; i++) {
      const t = i/10;
      const ly = H*(0.39 + 0.61*t);
      const lx = x0 + (ly-y0)/(y1-y0)*(x1-x0)*Math.min(1,(ly-y0)/(H*0.60));
      c.strokeStyle = '#0e0c1a';
      c.lineWidth = 1;
      c.beginPath();
      c.moveTo(Math.max(x0, lx), ly);
      c.lineTo(W*1.02, ly);
      c.stroke();
    }

    /* eave highlight */
    c.strokeStyle = 'rgba(78,74,115,0.52)';
    c.lineWidth = 2.5;
    c.beginPath();
    c.moveTo(W*0.58, H*0.18);
    c.lineTo(W*1.02, H*0.36);
    c.stroke();

    /* tomoe on right roof */
    const tomoe2 = [
      [W*0.71, H*0.49, H*0.042],
      [W*0.83, H*0.57, H*0.044],
      [W*0.94, H*0.64, H*0.040],
    ];
    for (const [tx, ty, tr] of tomoe2) {
      c.fillStyle = 'rgba(0,0,0,0.35)';
      c.beginPath(); c.arc(tx+2, ty+3, tr, 0, Math.PI*2); c.fill();
      c.fillStyle = '#100e1c';
      c.beginPath(); c.arc(tx, ty, tr, 0, Math.PI*2); c.fill();
      c.strokeStyle = '#08070e';
      c.lineWidth = Math.max(1.5, tr*0.09);
      for (let a=0; a<Math.PI*2; a+=Math.PI/4) {
        c.beginPath();
        c.moveTo(tx+Math.cos(a)*tr*0.40, ty+Math.sin(a)*tr*0.40);
        c.lineTo(tx+Math.cos(a)*tr*0.92, ty+Math.sin(a)*tr*0.92);
        c.stroke();
      }
      c.fillStyle = '#1c1a2a';
      c.beginPath(); c.arc(tx, ty, tr*0.66, 0, Math.PI*2); c.fill();
      c.fillStyle = '#0e0c18';
      c.beginPath(); c.arc(tx, ty, tr*0.26, 0, Math.PI*2); c.fill();
    }

    c.restore();
  }

  /* ──────────────────────────────
     WOODEN STAGE FLOOR
  ────────────────────────────── */
  function drawStageFloor(c, W, H) {
    const fy = H*0.79, fh = H*0.055;

    /* gold trim above */
    c.fillStyle = '#8a6818';
    c.fillRect(0, fy-5, W, 5);

    /* planks */
    const wg = c.createLinearGradient(0, fy, 0, fy+fh);
    wg.addColorStop(0,    '#9a6a38');
    wg.addColorStop(0.28, '#7a5228');
    wg.addColorStop(1,    '#3a2010');
    c.fillStyle = wg;
    c.fillRect(0, fy, W, fh);

    /* top sheen */
    c.fillStyle = 'rgba(255,215,120,0.20)';
    c.fillRect(0, fy, W, 4);

    /* plank lines */
    c.strokeStyle = 'rgba(0,0,0,0.28)';
    c.lineWidth = 1;
    for (let y=fy+10; y<fy+fh; y+=9) {
      c.beginPath(); c.moveTo(0,y); c.lineTo(W,y); c.stroke();
    }

    /* center light reflection */
    const cl = c.createLinearGradient(W*0.22,0, W*0.78,0);
    cl.addColorStop(0,   'rgba(255,180,80,0)');
    cl.addColorStop(0.5, 'rgba(255,180,80,0.18)');
    cl.addColorStop(1,   'rgba(255,180,80,0)');
    c.fillStyle = cl; c.fillRect(0, fy, W, fh);

    /* bottom trim */
    c.fillStyle = '#68501a';
    c.fillRect(0, fy+fh, W, 5);
    c.fillStyle = '#1a0c04';
    c.fillRect(0, fy+fh+5, W, H-(fy+fh+5));
  }

  /* ──────────────────────────────
     SIGN POST  (風林火山)
  ────────────────────────────── */
  function drawSignPost(c, W, H) {
    const sx = W*0.105, sy = H*0.79;
    const sw = 26, sh = 64;

    /* post */
    c.fillStyle = '#4a2e10';
    c.fillRect(sx+sw/2-3, sy-sh*0.15, 6, sh*0.45);

    /* board */
    c.fillStyle = '#7c5020';
    c.fillRect(sx, sy-sh, sw, sh*0.84);
    c.strokeStyle = '#4a2e10';
    c.lineWidth = 2;
    c.strokeRect(sx, sy-sh, sw, sh*0.84);

    /* inner dividers */
    const ch = sh*0.84/4;
    c.strokeStyle = 'rgba(50,25,8,0.55)'; c.lineWidth = 1;
    for (let i=1; i<4; i++) {
      c.beginPath(); c.moveTo(sx, sy-sh+ch*i); c.lineTo(sx+sw, sy-sh+ch*i); c.stroke();
    }

    /* characters */
    c.fillStyle = '#180a02';
    c.font = `bold ${Math.round(sw*0.54)}px serif`;
    c.textAlign = 'center';
    ['風','林','火','山'].forEach((ch2,i) =>
      c.fillText(ch2, sx+sw/2, sy-sh+ch*(i+0.80))
    );
  }

  draw();
  window.addEventListener('resize', draw);
})();
</script>

<script type="module">

const resultsWinner = document.getElementById('results-winner');

/* ════════════════════════════════════════
   FIRE PARTICLE SYSTEM
════════════════════════════════════════ */
const particles = [];

/* Pre-render 3 fire sprites (hot→warm→cool) to avoid per-particle gradient cost */
const fireSprites = ['#ffffc0,#ffdd00', '#ffaa00,#ff3300', '#ff2200,#660000']
  .map(spec => {
    const [inner, outer] = spec.split(',');
    const sz = 64, r = sz / 2;
    const oc = document.createElement('canvas');
    oc.width = oc.height = sz;
    const c = oc.getContext('2d');
    const g = c.createRadialGradient(r, r, 0, r, r, r);
    g.addColorStop(0,    inner + 'ff');
    g.addColorStop(0.35, inner + 'cc');
    g.addColorStop(0.65, outer + '99');
    g.addColorStop(1,    outer + '00');
    c.fillStyle = g;
    c.fillRect(0, 0, sz, sz);
    return oc;
  });

function spawnFire(cx, cy, faceW, faceH, power) {
  const ratio = Math.min(power / 100000, 1);
  if (ratio < 0.015) return;

  /* oval radius grows with power */
  const rx = faceW * 0.50 + ratio * 22;
  const ry = faceH * 0.56 + ratio * 14;

  /* arc range: top-only at low power → full circle at max */
  const spread = Math.PI * 0.45 + ratio * Math.PI * 1.55;
  const count  = Math.ceil(ratio * 11) + 1;

  for (let i = 0; i < count; i++) {
    const angle  = -Math.PI / 2 + (Math.random() - 0.5) * spread;
    const jitter = 0.83 + Math.random() * 0.32;
    const speed  = 2.0 + ratio * 5.8;

    particles.push({
      x:      cx + Math.cos(angle) * rx * jitter,
      y:      cy + Math.sin(angle) * ry * jitter,
      vx:     Math.cos(angle) * 0.45 * ratio + (Math.random() - 0.5) * 0.7,
      vy:     -speed * (0.68 + Math.random() * 0.64),
      size:   (7 + ratio * 24) * (0.42 + Math.random() * 0.78),
      life:   1.0,
      decay:  0.017 + Math.random() * 0.021,
      wobble: (Math.random() - 0.5) * 0.30,
      wPhase: Math.random() * Math.PI * 2,
    });
  }
  /* cap to prevent heavy frames */
  if (particles.length > 230) particles.splice(0, particles.length - 230);
}

function updateParticles() {
  const t = performance.now();
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x    += p.vx + Math.sin(t * 0.007 + p.wPhase) * p.wobble;
    p.y    += p.vy;
    p.vy   *= 0.983;
    p.vx   *= 0.964;
    p.size *= 0.969;
  }
}

function drawFire() {
  if (!particles.length) return;
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  for (const p of particles) {
    const t = p.life;
    /* sprite: 0=yellow(fresh) 1=orange(mid) 2=red(dying) */
    const sprite = t > 0.62 ? fireSprites[0] : t > 0.28 ? fireSprites[1] : fireSprites[2];
    ctx.globalAlpha = Math.min(t * 2.6, 0.94);
    ctx.drawImage(sprite, p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

/* ── Levels ── */
const LEVELS = [
  { min: 0,      label: 'STAND BY',         color: '#aaa'    },
  { min: 400,    label: 'WARMING UP',        color: '#88ff44' },
  { min: 3000,   label: 'GETTING SERIOUS',   color: '#ccff00' },
  { min: 10000,  label: '⚡ POWER RISING!',  color: '#ffff00' },
  { min: 30000,  label: 'OVER 9000!!',       color: '#ff8800' },
  { min: 65000,  label: 'FLAWLESS VICTORY!', color: '#ff4400' },
  { min: 100000, label: 'F A T A L I T Y !', color: '#ff00ff' },
];
const getLevel = p => LEVELS.filter(l => p >= l.min).pop();

/* ── Init MediaPipe ── */
async function init() {
  const vision = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm'
  );
  faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
      delegate: 'GPU',
    },
    outputFaceBlendshapes: true,
    runningMode: 'VIDEO',
    numFaces: 1,
  });
  loadScreen.style.display = 'none';
}
init().catch(e => {
  loadScreen.innerHTML = `<p style="color:#f55;font-size:8px;text-align:center">LOAD FAILED<br><br>${e.message}</p>`;
});

/* ══════════════════════════════════
   GAME STATE MACHINE
══════════════════════════════════ */

/* ── 1. Player select (lobby button) ── */
window.selectPlayers = async function (n) {
  playerCount   = n;
  playerScores  = new Array(n).fill(0);
  currentPlayer = 0;
  lobbyScreen.classList.add('hide');

  /* start camera once */
  if (!video.srcObject) {
    /* try front cam, fall back to any cam */
    const constraints = [
      { video: { facingMode: 'user' } },
      { video: true },
    ];
    let stream = null;
    for (const c of constraints) {
      try { stream = await navigator.mediaDevices.getUserMedia(c); break; }
      catch (_) { /* try next */ }
    }
    if (!stream) {
      alert('카메라를 시작할 수 없습니다.\nChrome에서 localhost의 카메라 권한을 허용해 주세요.');
      lobbyScreen.classList.remove('hide');
      return;
    }
    video.srcObject = stream;
    /* play() must be called BEFORE any await to stay in user-gesture context */
    const playPromise = video.play();
    /* also resolve once metadata is ready (runLoop checks readyState anyway) */
    await new Promise(res => {
      if (video.readyState >= 2) { res(); return; }
      video.addEventListener('canplay', res, { once: true });
      setTimeout(res, 3000); // fallback timeout
    });
    if (playPromise) playPromise.catch(() => {});
  }

  /* kick off model → loop if not running */
  if (!loopRunning) waitForModel();

  setTimeout(startReadyPhase, 200);
};

function waitForModel() {
  if (faceLandmarker) { runLoop(); return; }
  setTimeout(waitForModel, 200);
}

/* ── 2. Ready countdown ── */
function startReadyPhase() {
  gameState = 'ready';
  readyPlayerEl.textContent = `PLAYER ${currentPlayer + 1}`;
  readySubEl.textContent    = 'GET READY!';
  readyCountEl.textContent  = '3';
  readyCountEl.style.color  = '#fff';
  readyScreen.classList.add('show');

  let count = 3;
  clearInterval(readyHandle);
  readyHandle = setInterval(() => {
    count--;
    if (count > 0) {
      readyCountEl.textContent = String(count);
      readyCountEl.classList.remove('pop');
      void readyCountEl.offsetWidth;   /* reflow to re-trigger animation */
      readyCountEl.classList.add('pop');
    } else {
      clearInterval(readyHandle);
      readyCountEl.style.color  = '#ffd700';
      readyCountEl.textContent  = 'FIGHT!';
      readySubEl.textContent    = '';
      readyCountEl.classList.remove('pop');
      void readyCountEl.offsetWidth;
      readyCountEl.classList.add('pop');
      setTimeout(() => {
        readyScreen.classList.remove('show');
        startBattlePhase();
      }, 750);
    }
  }, 1000);
}

/* ── 3. Battle phase (15-second turn) ── */
function startBattlePhase() {
  gameState     = 'battle';
  turnPeakPower = 0;
  turnSec       = 15;
  faceWasGone   = true;
  smoothPower   = 0;

  /* HUD */
  document.getElementById('p1-name').textContent  = `PLAYER ${currentPlayer + 1}`;
  roundNumEl.textContent = `${currentPlayer + 1}/${playerCount}`;
  timerEl.textContent    = '15';
  timerEl.classList.remove('urgent');
  hpP1.style.width = '0%';

  /* best of previous players → right bar */
  const prevBest = playerScores.slice(0, currentPlayer).reduce((a, b) => Math.max(a, b), 0);
  hpHs.style.width = Math.min((prevBest / 100000) * 100, 100) + '%';

  clearInterval(turnHandle);
  turnHandle = setInterval(() => {
    turnSec--;
    timerEl.textContent = String(turnSec).padStart(2, '0');
    if (turnSec <= 5) timerEl.classList.add('urgent');
    if (turnSec <= 0) { clearInterval(turnHandle); endTurn(); }
  }, 1000);
}

/* ── 4. End of one player's turn ── */
function endTurn() {
  playerScores[currentPlayer] = turnPeakPower;
  if (turnPeakPower > highScore) {
    highScore = turnPeakPower;
    hsNumEl.textContent = highScore.toLocaleString();
  }
  currentPlayer++;

  if (currentPlayer < playerCount) {
    showAnnounce(`${turnPeakPower.toLocaleString()} PWR`, 'RECORDED!');
    setTimeout(startReadyPhase, 2400);
  } else {
    showAnnounce('GAME OVER!', '');
    setTimeout(showResults, 2200);
  }
}

/* ── 5. Results ── */
function showResults() {
  gameState = 'results';
  const medals  = ['🥇','🥈','🥉'];
  const classes = ['first','second','third'];
  const ranked  = playerScores
    .map((score, i) => ({ player: i + 1, score }))
    .sort((a, b) => b.score - a.score);

  resultsWinner.textContent = ranked.length > 1
    ? `👑  PLAYER ${ranked[0].player}  WINS!`
    : `PLAYER 1  —  ${ranked[0].score.toLocaleString()} PWR`;

  resultsList.innerHTML = ranked.map((r, i) => `
    <div class="r-row ${classes[i] || ''}" style="animation-delay:${i * 0.25}s">
      <div class="r-medal">${medals[i] || `${i+1}.`}</div>
      <div class="r-rank">${i === 0 ? 'WINNER' : `RANK ${i+1}`}</div>
      <div class="r-name">PLAYER ${r.player}</div>
      <div class="r-score">${r.score.toLocaleString()}</div>
    </div>`).join('');

  resultsScreen.classList.add('show');
}

/* ── 6. Back to lobby ── */
window.backToLobby = function () {
  gameState      = 'lobby';
  currentPlayer  = 0;
  playerScores   = [];
  turnPeakPower  = 0;
  resultsScreen.classList.remove('show');
  lobbyScreen.classList.remove('hide');
  powerNumEl.textContent = '------';
  timerEl.textContent    = '--';
  timerEl.classList.remove('urgent');
  hpP1.style.width = '0%';
  document.getElementById('p1-name').textContent = 'PLAYER 1';
  roundNumEl.textContent = '1';
};

/* ── Power calculation ── */
/* ── Random power state ── */
let _rTarget = 0;
let _rFrames = 0;
let _rInterval = 30;

function calcPower(blendshapes) {
  if (!blendshapes?.length) { _rFrames = 0; return 0; }

  _rFrames++;

  /* 주기마다 새 목표 수치를 랜덤으로 뽑음 */
  if (_rFrames === 1 || _rFrames % _rInterval === 0) {
    _rInterval = 18 + Math.floor(Math.random() * 28); // 0.3~0.75초 간격
    const roll = Math.random();
    if (roll < 0.22)      _rTarget = Math.random() * 5000;           // 낮음
    else if (roll < 0.55) _rTarget = 8000  + Math.random() * 47000;  // 중간
    else if (roll < 0.82) _rTarget = 55000 + Math.random() * 35000;  // 높음
    else                  _rTarget = 95000 + Math.random() * 25000;  // 대박 스파이크
  }

  return Math.floor(_rTarget);
}

/* ── Canvas overlay ── */
function drawOverlay(landmarks, power) {
  ctx.clearRect(0, 0, 660, 456);

  const ratio = Math.min(power / 100000, 1);
  const lv    = getLevel(power);
  const glow  = lv.color;

  /* always tick particles so they die out gracefully when face is gone */
  updateParticles();

  if (!landmarks?.length) {
    drawFire();
    return;
  }

  const lm = landmarks[0];
  let sumX = 0, sumY = 0;
  let minX = 1, maxX = 0, minY = 1, maxY = 0;
  for (const p of lm) {
    sumX += p.x; sumY += p.y;
    if (p.x < minX) minX = p.x;
    if (p.x > maxX) maxX = p.x;
    if (p.y < minY) minY = p.y;
    if (p.y > maxY) maxY = p.y;
  }
  const n     = lm.length;
  const cx    = (1 - sumX / n) * 660;
  const cy    =      sumY / n  * 456;
  const faceW = (maxX - minX) * 660;
  const faceH = (maxY - minY) * 456;

  /* spawn fire along face oval */
  spawnFire(cx, cy, faceW, faceH, power);

  /* aura */
  if (ratio > 0.04) {
    const rad = 80 + ratio * 160;
    const g   = ctx.createRadialGradient(cx, cy, 10, cx, cy, rad);
    const a   = ratio * 0.16;
    g.addColorStop(0,    hexA(glow, a));
    g.addColorStop(0.55, hexA(glow, a * 0.3));
    g.addColorStop(1,    hexA(glow, 0));
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(cx, cy, rad, 0, Math.PI * 2);
    ctx.fill();
  }

  /* fire — drawn after aura, before crosshair */
  drawFire();

  /* SF2-style crosshair */
  const cs = 36 + ratio * 20;
  const arm = cs * 0.45;
  ctx.save();
  ctx.strokeStyle = glow;
  ctx.lineWidth   = 2.5;
  ctx.shadowColor = glow;
  ctx.shadowBlur  = 14;
  ctx.beginPath();
  for (const [sx, sy] of [[-1,-1],[1,-1],[-1,1],[1,1]]) {
    const bx = cx + sx * cs, by = cy + sy * cs;
    ctx.moveTo(bx, by); ctx.lineTo(bx + sx * arm, by);
    ctx.moveTo(bx, by); ctx.lineTo(bx, by + sy * arm);
  }
  ctx.moveTo(cx-8, cy); ctx.lineTo(cx+8, cy);
  ctx.moveTo(cx, cy-8); ctx.lineTo(cx, cy+8);
  ctx.stroke();
  ctx.restore();

  /* readout */
  ctx.save();
  ctx.font        = "bold 10px 'Press Start 2P', monospace";
  ctx.fillStyle   = glow;
  ctx.shadowColor = glow;
  ctx.shadowBlur  = 8;
  ctx.textAlign   = 'right';
  ctx.fillText(`PWR ${power.toLocaleString()}`, 648, 446);
  ctx.restore();
}

function hexA(hex, a) {
  const r = parseInt(hex.slice(1,3)||'ff',16);
  const g = parseInt(hex.slice(3,5)||'ff',16);
  const b = parseInt(hex.slice(5,7)||'ff',16);
  return `rgba(${r},${g},${b},${Math.min(1,a).toFixed(3)})`;
}

/* ── Announcements ── */
function showAnnounce(line1, line2) {
  announceRound.textContent = line1;
  announceSub.textContent   = line2;
  announceEl.classList.add('show');
  clearTimeout(announceTimer);
  announceTimer = setTimeout(() => announceEl.classList.remove('show'), 1800);
}

function showRecordFlash() {
  recFlashEl.classList.add('show');
  clearTimeout(recFlashTimer);
  recFlashTimer = setTimeout(() => recFlashEl.classList.remove('show'), 1400);
}

/* ── Main detection loop ── */
function runLoop() {
  if (loopRunning) return;
  loopRunning = true;

  function detect() {
    requestAnimationFrame(detect);
    if (video.readyState < 2) return;
    if (video.currentTime === lastVideoTime) return;
    lastVideoTime = video.currentTime;

    const res      = faceLandmarker.detectForVideo(video, performance.now());
    const faceHere = !!(res.faceBlendshapes?.length);
    const rawPow   = calcPower(res.faceBlendshapes);

    smoothPower = smoothPower * 0.82 + rawPow * 0.18; /* 느린 스무딩 → 극적인 오르내림 */
    const p = Math.floor(smoothPower);

    if (gameState === 'battle') {
      /* track peak for this turn */
      if (p > turnPeakPower) turnPeakPower = p;

      /* face events */
      if (faceHere && faceWasGone)   showAnnounce('FIGHT!', '');
      if (!faceHere && !faceWasGone) showAnnounce('K.O.', '');
      faceWasGone = !faceHere;

      /* level + color */
      const lv = getLevel(p);
      powerNumEl.textContent      = p.toLocaleString();
      powerNumEl.style.color      = lv.color;
      powerNumEl.style.textShadow = `2px 2px 0 #4a0000, 0 0 14px ${lv.color}`;
      levelEl.textContent         = lv.label;
      levelEl.style.color         = lv.color;
      levelEl.style.textShadow    = `2px 2px 0 #4a0000, 0 0 10px ${lv.color}`;

      /* P1 HP bar */
      const MAX = 100000;
      const pct = Math.min((p / MAX) * 100, 100);
      hpP1.style.width = pct + '%';
      hpP1.className   = pct > 70 ? 'ultra' : pct > 35 ? 'warn' : pct > 0 ? 'danger' : '';

      /* record flash if beat previous best */
      if (p > highScore) {
        highScore = p;
        hsNumEl.textContent = highScore.toLocaleString();
        showRecordFlash();
      }
    }

    drawOverlay(res.faceLandmarks, gameState === 'battle' ? p : 0);
  }
  detect();
}
